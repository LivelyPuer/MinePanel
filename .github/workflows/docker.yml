name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push serverjars
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serverjars
          platforms: linux/amd64,linux/arm64
          push: true
          tags: livelypuer/serverjars:latest
          cache-from: type=gha,scope=serverjars
          cache-to: type=gha,mode=max,scope=serverjars

      - name: Build & push minepanel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.panel
          platforms: linux/amd64,linux/arm64
          push: true
          tags: livelypuer/minepanel:latest
          cache-from: type=gha,scope=panel
          cache-to: type=gha,mode=max,scope=panel
